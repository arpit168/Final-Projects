<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Harmonium - Indian Musical Instrument</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body data-theme="light">
    <div class="container">
        <!-- Header with Theme Toggle -->
        <div class="header">
            <div class="title-section">
                <span class="harmonium-icon">🎹</span>
                <h1>प्रोफेशनल हारमोनियम</h1>
            </div>
            <div class="theme-toggle">
                <button class="theme-btn active" onclick="setTheme('light')">
                    <span>☀️</span> Light
                </button>
                <button class="theme-btn" onclick="setTheme('dark')">
                    <span>🌙</span> Dark
                </button>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-group">
                <label>🔊 मास्टर वॉल्यूम</label>
                <div class="volume-slider">
                    <i>🔈</i>
                    <input type="range" id="masterVolume" min="0" max="100" value="75" oninput="updateVolume(this.value)">
                    <span class="volume-value" id="volumeDisplay">75%</span>
                    <i>🔊</i>
                </div>
            </div>
            
            <div class="control-group">
                <label>🎵 साउंड बैंक</label>
                <select class="sound-selector" id="soundBank" onchange="changeSoundBank(this.value)">
                    <option value="classical">🎵 क्लासिकल हारमोनियम</option>
                    <option value="modern">🎹 मॉडर्न हारमोनियम</option>
                    <option value="flute">🌿 बांसुरी</option>
                    <option value="santoor">✨ संतूर</option>
                    <option value="organ">⛪ चर्च ऑर्गन</option>
                    <option value="accordion">🎼 अकॉर्डियन</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>⚡ रीड सेटिंग</label>
                <div class="volume-slider">
                    <i>🎯</i>
                    <input type="range" id="reedSetting" min="1" max="3" value="2" step="0.1" oninput="updateReed(this.value)">
                    <span class="volume-value" id="reedDisplay">2.0x</span>
                </div>
            </div>
        </div>

        <!-- Harmonium Body -->
        <div class="harmonium-body">
            <div class="bellows" id="bellows">
                <i>🎵</i> बेलो चला रहा है <i>🎵</i>
            </div>
            
            <div class="keyboards">
                <!-- Upper Row (White Keys - Sa Re Ga Ma) -->
                <div class="upper-row" id="upperRow">
                    <!-- Keys will be generated by JavaScript -->
                </div>
                
                <!-- Lower Row (Black Keys - Pa Dha Ni Sa) -->
                <div class="lower-row" id="lowerRow">
                    <!-- Keys will be generated by JavaScript -->
                </div>
            </div>
        </div>

        <!-- Info Panel -->
        <div class="info-panel">
            <div class="current-note">
                <span class="key-indicator">
                    <span>🎵 करंट नोट:</span>
                    <span class="note-display" id="currentNote">सा (C)</span>
                </span>
            </div>
            <div class="key-indicator">
                <span>🎹 दबी हुई कुंजियाँ:</span>
                <div class="pressed-keys" id="pressedKeys"></div>
            </div>
        </div>

        <!-- Keyboard Shortcuts Guide -->
        <div class="shortcuts-guide">
            <h3>⌨️ कीबोर्ड शॉर्टकट - Q से P और A से L तक (दबाकर रखें)</h3>
            <div class="shortcut-grid" id="shortcutGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
